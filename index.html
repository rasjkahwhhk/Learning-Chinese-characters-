<style>

}
*{box-sizing:border-box}
body{margin:0;font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;background:radial-gradient(circle at 12% 14%,rgba(255,255,255,.55) 0 18px,transparent 19px),radial-gradient(circle at 86% 10%,rgba(255,255,255,.42) 0 14px,transparent 15px),radial-gradient(circle at 20% 82%,rgba(255,255,255,.38) 0 12px,transparent 13px),linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.wrap{max-width:980px;margin:0 auto;padding:16px 14px 36px}
.hero{background:linear-gradient(180deg,#fffdf8,#f7edcf);border:2px solid var(--line);border-radius:30px;padding:18px 18px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:before,.hero:after{display:block;position:absolute;opacity:.22;font-size:34px}.hero:before{content:"☁️";right:20px;top:12px}.hero:after{content:"⭐";right:64px;top:18px}

.sub{margin:6px 0 0;line-height:1.65;color:#8a7440}
.topbar{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:12px;align-items:center}
button,select{height:46px;border-radius:14px;border:1.5px solid var(--line);background:#fffdf8;color:var(--text);font-size:15px;font-weight:700;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button{padding:0 16px;cursor:pointer;box-shadow:0 4px 10px rgba(160,132,70,.10);background:linear-gradient(180deg,#fffdf9,#f4e7bc)}

.main{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
.panel{background:rgba(255,253,248,.97);border:2px solid var(--line);border-radius:28px;padding:15px;box-shadow:var(--shadow)}
.side h2,.learn h2{margin:0 0 12px;font-size:20px}
.theme-list{display:grid;gap:10px}

.theme-btn.active{background:linear-gradient(180deg,#fff7df,#f3e3aa);border-color:#dcc98b}
.stage-tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.tab{height:42px;padding:0 14px;border-radius:999px}
.tab.active{background:linear-gradient(180deg,#fff7df,#f3e3aa);border-color:#dcc98b}
.card{background:linear-gradient(180deg,#fffefc,#fbf3db);border:2px solid #e4d4a0;border-radius:28px;padding:16px;display:grid;grid-template-columns:1.05fr .95fr;gap:14px}
.pic{min-height:310px;border:2px dashed #e1d29d;border-radius:24px;background:#fffdf8;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;padding:12px}.emoji-visual{font-size:128px;line-height:1;filter:drop-shadow(0 8px 12px rgba(171,128,28,.12))}.emoji-wrap{display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:linear-gradient(180deg,#fffdf7,#f6edd1);border-radius:20px}.art-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.info{display:flex;flex-direction:column;gap:10px}
.hanzi{font-size:88px;line-height:1;font-weight:900;color:#1d3c5d}
.pinyin{font-size:26px;font-weight:800;color:#a26b10}
.english-word{font-size:34px;font-weight:900;color:#7e5310;line-height:1.15}
.box{background:#fffdf8;border:2px solid #e8dbb1;border-radius:18px;padding:10px 12px;line-height:1.6}
.label{display:block;font-size:12px;font-weight:900;letter-spacing:.4px;color:#a17722;text-transform:uppercase;margin-bottom:4px}
.top-chip{background:linear-gradient(180deg,#fffaf0,#f4e7c0);border:1.5px solid var(--line);border-radius:999px;box-shadow:0 2px 6px rgba(160,132,70,.06)}
.progress{font-size:14px;color:#8b6725;margin-top:8px;background:#fbf3dc;border:1.5px solid #e7d8aa;border-radius:999px;display:inline-block;padding:5px 10px}
.video-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.vtab{height:40px;border-radius:999px;background:linear-gradient(180deg,#fffdf8,#f5e9c4)}
.vtab-active{background:linear-gradient(180deg,#fff7dd,#f1e2ac)!important;border-color:#dcc98b!important}

.action-row{display:flex;gap:10px;flex-wrap:wrap}
.action-row button{height:42px}
.writer-wrap{height:250px;border:2px dashed #efcf78;border-radius:24px;background:#fffdf7;display:flex;align-items:center;justify-content:center}
.writer-target{width:220px;height:220px}
.footer-nav{display:flex;justify-content:space-between;gap:10px;margin-top:14px}
.progress{font-size:14px;color:#8b6725;margin-top:8px}
.tip{background:linear-gradient(180deg,#fcf5dd,#f8edd0);border:2px solid #e8dbb1;border-radius:18px;padding:10px 12px;line-height:1.6}
.quiz-box{display:grid;gap:12px}.quiz-question{font-size:22px;font-weight:900;color:#7c5610}.quiz-options{display:grid;gap:10px}.quiz-option{height:52px;justify-content:flex-start;text-align:left;padding:0 14px}.quiz-feedback{min-height:26px;font-weight:800}.good{color:#2e7d32}.bad{color:#c62828}

.small{font-size:14px;color:#8b6725}.chant-box{margin:10px 0 14px;background:linear-gradient(180deg,#fffdf8,#f8eed0);border:2px solid var(--line);border-radius:24px;padding:12px 12px 10px;box-shadow:var(--shadow)}.video-tabs{display:flex;gap:8px;margin-bottom:10px}.vtab{flex:1;height:36px;border-radius:999px;border:2px solid #efcf78;background:#fffdf3;font-size:13px;font-weight:700;color:#8b6725;cursor:pointer;transition:all .2s}.vtab-active{background:linear-gradient(180deg,#fff3c0,#ffd045);border-color:#efc85d;color:#7d5610;box-shadow:0 3px 0 #c49010}.video-wrap{width:100%;aspect-ratio:16/9;border-radius:18px;overflow:hidden;margin-bottom:4px;background:#000;box-shadow:0 4px 12px rgba(0,0,0,.2)}.video-wrap iframe{width:100%;height:100%;border:0;display:block}.yt-open-link{display:block;text-align:center;margin-top:6px;font-size:12px;color:#8b6725;text-decoration:underline}.custom-video-panel{margin-top:10px;padding:10px;border:2px dashed #efcf78;border-radius:18px;background:#fff9e8}.custom-video-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:stretch}.custom-video-btn{height:34px;padding:0 10px;border:none;border-radius:14px;background:linear-gradient(180deg,#fff3c0,#ffd045);box-shadow:0 3px 0 #c49010;font-weight:800;font-size:12px;color:#7d5610;cursor:pointer;width:100%}.custom-video-note{margin-top:6px;font-size:11px;color:#8b6725;line-height:1.45}.custom-video-status{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}.custom-video-badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;background:#faf3dc;color:#8a7440;border:1px solid #e1d2a2;box-shadow:0 2px 5px rgba(160,132,70,.06)}.custom-video-badge.active{background:#eef6e8;color:#547047;border-color:#c8d8bc}.video-editor-mask{position:fixed;inset:0;background:rgba(0,0,0,.38);display:none;align-items:center;justify-content:center;z-index:9999;padding:18px}.video-editor-mask.show{display:flex}.video-editor-box{width:min(92vw,520px);background:#fffdf7;border:1.5px solid var(--line);border-radius:24px;padding:16px;box-shadow:0 10px 28px rgba(0,0,0,.22)}.video-editor-title{font-size:18px;font-weight:900;color:#7d5610;margin-bottom:10px}.video-editor-textarea{width:100%;min-height:110px;border-radius:14px;border:2px solid #efcf78;padding:10px 12px;font-size:14px;line-height:1.5;color:#5d4310;background:#fffdf5;resize:vertical;box-sizing:border-box}.video-editor-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.video-editor-btn{height:36px;padding:0 10px;border:none;border-radius:14px;background:linear-gradient(180deg,#fff3c0,#ffd045);box-shadow:0 3px 0 #c49010;font-weight:800;font-size:12px;color:#7d5610;cursor:pointer;width:100%}.video-editor-btn.secondary{background:#fff;border:2px solid #efcf78;box-shadow:none}.video-editor-tip{margin-top:8px;font-size:12px;color:#8b6725;line-height:1.45}.theme-modal{position:fixed;inset:0;background:rgba(86,63,10,.22);display:none;align-items:flex-end;justify-content:center;z-index:50}.theme-modal.show{display:flex}.theme-sheet{width:min(100%,720px);background:linear-gradient(180deg,#fffdf8,#f6edd0);border:2px solid var(--line);border-radius:26px 26px 0 0;padding:18px 16px 20px;box-shadow:0 -8px 20px rgba(138,114,56,.08)}.theme-sheet h3{margin:0 0 12px;font-size:24px}.theme-grid{display:grid;gap:10px}.theme-item{height:50px;justify-content:flex-start;text-align:left;padding:0 14px;border-radius:16px}.theme-close{width:100%;margin-top:12px}.top-chip{display:inline-flex;align-items:center;gap:8px;background:#fff9e6;border:2px solid #efcf78;border-radius:999px;padding:8px 12px;font-size:14px;font-weight:800;color:#8b6725}.mode-on{background:linear-gradient(180deg,#fff2b7,#ffe089) !important;border-color:#efc85d !important}
.mode-row{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap}
.nav-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0 12px}
.nav-arrow{height:52px;font-size:24px;border-radius:18px}
.paw-btn{display:flex;align-items:center;justify-content:center}
#leftPane,#rightPane{min-width:0}
#rightPane{padding-bottom:4px}

@media (max-width:880px){
  .wrap{padding:8px 10px calc(16px + env(safe-area-inset-bottom, 0px))}
  .hero{padding:12px}
  .hero h1{font-size:26px;line-height:1.12;margin-bottom:8px}
  .panel{padding:14px;border-radius:22px}
  .topbar{grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .mode-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
  button,select{height:46px;font-size:15px;padding:0 12px;border-radius:15px}
  #themeToggleBtn,#toggleInfoBtn,#basicModeBtn,#fullModeBtn{height:40px;font-size:13px}
  .top-chip{width:100%;justify-content:center;padding:6px 10px;font-size:13px;margin-top:6px}
  .theme-sheet{padding:16px 14px calc(18px + env(safe-area-inset-bottom, 0px));max-height:82vh;overflow:auto}
  .theme-grid{grid-template-columns:1fr;gap:10px}
  .theme-item,.theme-close{height:52px;font-size:15px}
  .main{grid-template-columns:1fr;gap:14px;margin-top:12px}
  .card{grid-template-columns:1fr;gap:14px;padding:14px;border-radius:24px}
  .learn-stage{padding-top:18px !important}
  .pic{min-height:230px;padding:10px;border-radius:22px}
  .writer-wrap{height:220px;border-radius:20px}
  .writer-target{width:200px;height:200px}
  .hanzi{font-size:64px}
  .pinyin{font-size:24px}
  .english-word{font-size:26px}
  .small{font-size:15px}
  .progress{font-size:15px}
  .stage-tabs{display:grid;grid-template-columns:1fr;margin-bottom:10px}
  .tab{height:48px;font-size:15px}
  .nav-row{position:sticky;bottom:8px;z-index:8;background:linear-gradient(180deg,rgba(255,248,224,.0),rgba(255,248,224,.96) 30%);padding-top:8px;margin:6px 0 10px}
  .nav-arrow{height:48px;font-size:22px}
  .action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .action-row button{height:42px;font-size:13px;line-height:1.1;padding:0 8px;border-radius:14px}
  .quiz-question{font-size:20px}
  .quiz-option{height:54px;font-size:15px}
  .chant-box{padding:12px;border-radius:22px}
  .vtab{height:38px;font-size:13px}
  .custom-video-btn{height:34px;font-size:12px;padding:0 8px;border-radius:12px;width:100%}
  .video-editor-box{width:min(94vw,520px);padding:14px;border-radius:20px}
  .video-editor-textarea{min-height:120px;font-size:16px}
  .video-editor-btn{height:42px;font-size:15px}
  .custom-video-row,.video-editor-actions{grid-template-columns:1fr 1fr;gap:8px}
  .video-editor-btn{height:36px;font-size:12px;padding:0 8px;border-radius:12px;width:100%}
}

@media (max-width:430px){
  .topbar,.mode-row{grid-template-columns:1fr 1fr;gap:8px}
  .action-row{grid-template-columns:1fr 1fr;gap:8px}
  .hero{padding:10px}
  .hero h1{font-size:22px;margin-bottom:6px}
  #themeToggleBtn,#toggleInfoBtn,#basicModeBtn,#fullModeBtn{height:36px;font-size:12px;padding:0 6px;border-radius:12px}
  .top-chip{padding:5px 8px;font-size:12px}
  .hanzi{font-size:56px}
  .english-word{font-size:24px}
  .pinyin{font-size:22px}
  .pic{min-height:210px}
  .theme-item,.theme-close,.quiz-option{height:52px}
  .nav-arrow{height:44px;font-size:20px;border-radius:14px}
  .action-row button{height:40px;font-size:12px;padding:0 6px;border-radius:12px}
  .custom-video-row,.video-editor-actions{grid-template-columns:1fr 1fr;gap:6px}
  .custom-video-btn,.video-editor-btn{height:32px;font-size:11px;padding:0 6px;border-radius:10px;width:100%}
}

@media print{button,select,.side,.stage-tabs,.footer-nav{display:none !important}.main{grid-template-columns:1fr}.panel{box-shadow:none}}
</style>
</head>

</div>

function _extractYouTubeId(input) {
  if (!input) return '';
  input = input.trim();
  if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
  var m = input.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  m = input.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  m = input.match(/embed\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  m = input.match(/shorts\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  return '';
}

function _makeVideoHTML(vid) {
  var embedUrl = 'https://www.youtube.com/embed/' + vid + '?rel=0';
  var watchUrl = 'https://www.youtube.com/watch?v=' + vid;
  var h = '<div class="video-wrap">';
  h += '<iframe src="' + embedUrl + '" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen loading="lazy"></iframe>';
  h += '</div>';
  h += '<a class="yt-open-link" href="' + watchUrl + '" target="_blank">▶ 在 YouTube 上打开</a>';
  return h;
}

function switchSongLang(lang) {
  var v = THEME_VIDEOS[currentTheme] || {};
  var defaultVid = lang === 'zh' ? (v.zh || '') : (v.en || '');
  var customVid = localStorage.getItem('customVideo_' + currentTheme + '_' + lang) || '';
  var vid = customVid || defaultVid;
  document.querySelectorAll('.vtab').forEach(function(b) {
    b.classList.toggle('vtab-active', b.getAttribute('data-lang') === lang);
  });
  var vc = document.getElementById('vc');
  if (vc) vc.innerHTML = _makeVideoHTML(vid);
  _refreshCustomVideoStatus();
}

function _refreshCustomVideoStatus() {

function openVideoEditor(lang) {

  if (area) area.value = saved;
  if (modal) modal.classList.add('show');
  setTimeout(function(){ if(area){ area.focus(); area.select(); } }, 60);

function closeVideoEditor() {
  var modal = document.getElementById('videoEditorMask');
  if (modal) modal.classList.remove('show');
}

async function tryPasteFromClipboard() {
  try {
    if (navigator.clipboard && navigator.clipboard.readText) {
      var clip = await navigator.clipboard.readText();
      if (clip && clip.trim()) {
        var area = document.getElementById('videoEditorTextarea');
        if (area && !area.value.trim()) area.value = clip.trim();
      }
    }
  } catch (e) {}
}

}

function chooseVoice(lang){
  const voices = speechSynthesis.getVoices ? speechSynthesis.getVoices() : [];
  if(lang==='zh') return voices.find(v => /zh|mandarin|chinese|taiwan|hong kong/i.test((v.lang||'') + ' ' + (v.name||'')));
  return voices.find(v => /en-US|en-GB|en/i.test(v.lang || ''));
}
function speak(lang, text){
  if(!('speechSynthesis' in window) || !text) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang === 'zh' ? 'zh-CN' : 'en-US';
  u.rate = lang === 'zh' ? 0.9 : 0.96;
  u.pitch = 1.02;
  const v = chooseVoice(lang);
  if(v) u.voice = v;
  speechSynthesis.speak(u);
}
function speakPage(){
  const item = getCurrentItem();
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const zh = new SpeechSynthesisUtterance(item.text + '，' + item.pinyin + '，' + item.meaningZh);
  zh.lang = 'zh-CN'; zh.rate = 0.9; const zv = chooseVoice('zh'); if(zv) zh.voice = zv;
  const en1 = new SpeechSynthesisUtterance(item.englishWord);
  en1.lang = 'en-US'; en1.rate = 0.96; const ev = chooseVoice('en'); if(ev) en1.voice = ev;
  const en2 = new SpeechSynthesisUtterance(item.englishExplanation);
  en2.lang = 'en-US'; en2.rate = 0.96; if(ev) en2.voice = ev;
  zh.onend = () => { en1.onend = () => speechSynthesis.speak(en2); speechSynthesis.speak(en1); };
  speechSynthesis.speak(zh);
}

function renderWrite(item){
  const chars = Array.from(item.text || '');
  const writerHtml = chars.length === 1
    ? `<div id="writer-0" class="writer-target"></div>`
    : `<div class="writer-grid">${chars.map((ch, i) => `<div class="writer-cell"><div id="writer-${i}" class="writer-mini"></div><div class="writer-char">${ch}</div></div>`).join('')}</div>`;
  leftPane.innerHTML = `
    <div class="pic" onclick="speakPage()">${renderVisual(item)}</div>
    <div class="small">看图写字。</div>
    <div class="writer-wrap" style="margin-top:12px;">${writerHtml}</div>
    <div class="small">笔顺。</div>
    <div class="swipe-tip">点脚印切换。</div>`;
  rightPane.innerHTML = `
    <div class="hanzi">${item.text}</div>
    <div class="pinyin">${item.pinyin}</div>
    <div class="english-word">${item.englishWord}</div>
    <div class="action-row">
      <button onclick="speak('zh', '${item.text}')">🔊 中文</button>
      <button onclick="speak('en', '${item.englishWord}')">🔊 English</button>
      <button onclick="speakPage()">🔊 双语</button>
      <button onclick="initWriter(true)">✍️ 播放笔顺</button>
    </div>
    ${showInfo ? infoBlock('English explanation', item.englishExplanation) : ''}
  `;
  setTimeout(() => initWriter(true), 120);
}


function buildQuizOptions(item){
  const sameTheme = DATA[currentTheme].items.filter(x => x.text !== item.text);
  const distractors = sameTheme.slice(0, 3).map(x => x.englishWord);
  while(distractors.length < 3) distractors.push('something else');
  const options = [item.englishWord, ...distractors.slice(0,3)];
  return options.sort(() => Math.random() - 0.5);
}
function renderQuiz(item){
  const options = buildQuizOptions(item);
  leftPane.innerHTML = `<div class="pic" onclick="speak('zh', '${item.text}')">${renderVisual(item)}</div><div class="small">选英文。</div>`;
  rightPane.innerHTML = `
    <div class="quiz-box">
      <div class="hanzi">${item.text}</div>
      <div class="pinyin">${item.pinyin}</div>
      <div class="quiz-question">Match the English word.</div>
      <div class="quiz-options">
        ${options.map(opt => `<button class="quiz-option" onclick="checkQuiz('${opt.replace(/'/g, '&#39;')}')">${opt}</button>`).join('')}
      </div>
      <div id="quizFeedback" class="quiz-feedback"></div>
      ${infoBlock('Hint', item.englishExplanation)}
    </div>`;
}

window.checkQuiz = function(choice){
  const item = getCurrentItem();
  const el = document.getElementById('quizFeedback');
  if(!el) return;
  if(choice === item.englishWord){
    el.className = 'quiz-feedback good';
    el.textContent = 'Great job! That is correct.';
    speak('en', item.englishWord);
  }else{
    el.className = 'quiz-feedback bad';
    el.textContent = 'Try again.';
  }
};

function initWriter(animate=false){
  const item = getCurrentItem();
  const chars = Array.from(item.text || '');
  writers = [];
  chars.forEach((ch, idx) => {
    const el = document.getElementById(`writer-${idx}`);
    if(!el || !window.HanziWriter) return;
    el.innerHTML = '';
    const size = chars.length === 1 ? 220 : 104;
    try {
      const w = HanziWriter.create(`writer-${idx}`, ch, {
        width:size,
        height:size,
        padding:6,
        showOutline:true,
        strokeAnimationSpeed:1,
        delayBetweenStrokes:180,
        charDataLoader:(char,onLoad,onError)=>{
          fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${encodeURIComponent(char)}.json`)
            .then(r=>{ if(!r.ok) throw new Error('not found'); return r.json(); })
            .then(onLoad)
            .catch(err=>{ if(onError) onError(err); });
        }
      });
      writers.push(w);
    } catch (e) {
      el.innerHTML = `<div class="small">${ch}</div>`;
    }
  });
  if(animate){
    writers.forEach((w, i) => setTimeout(() => w.animateCharacter(), i * 450));
  }
}
function goNext(){
  const list = DATA[currentTheme].items;
  currentIndex = (currentIndex + 1) % list.length;
  currentStage = 'write';
  render();
}
function goPrev(){
  const list = DATA[currentTheme].items;
  currentIndex = (currentIndex - 1 + list.length) % list.length;
  currentStage = 'write';
  render();
}

function render(){
  const item = getCurrentItem();
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.stage === currentStage);
    tab.disabled = false;
    tab.style.opacity = '1';
  });
  if(currentStage !== 'write' && currentStage !== 'quiz') currentStage = 'write';
  learnTitle.textContent = currentStage === 'write' ? '写字学习' : 'Quiz 小测验';
  if(currentStage === 'write') renderWrite(item);
  if(currentStage === 'quiz') renderQuiz(item);
  renderThemeUI();
  renderChant();
  toggleInfoBtn.textContent = showInfo ? '🙉 显示更少' : '🙈 隐藏解释';
  saveAppState();
}



document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => { currentStage = tab.dataset.stage; render(); };
});

toggleInfoBtn.onclick = () => { showInfo = !showInfo; toggleInfoBtn.textContent = showInfo ? '🙉 显示更少' : '🙈 隐藏解释'; render(); };
themeSelect.onchange = (e) => { currentTheme = e.target.value; currentIndex = 0; currentStage = 'write'; render(); };
themeToggleBtn.onclick = () => { themeModal.classList.add('show'); };
themeCloseBtn.onclick = () => { themeModal.classList.remove('show'); };
themeModal.onclick = (e) => { if(e.target === themeModal) themeModal.classList.remove('show'); };
basicModeBtn.onclick = () => { currentMode = 'basic'; if(!BASIC_THEME_KEYS.includes(currentTheme)) currentTheme = BASIC_THEME_KEYS[0]; currentIndex = 0; currentStage = 'write'; render(); };
fullModeBtn.onclick = () => { currentMode = 'full'; currentIndex = 0; currentStage = 'write'; render(); };

leftArrowBtn.onclick = () => goPrev();
rightArrowBtn.onclick = () => goNext();

loadAppState();
buildThemeUI();
render();
</script>
